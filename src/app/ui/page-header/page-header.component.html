<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons *ngIf="showMenu || backHref" slot="start">
      <ion-menu-button *ngIf="showMenu" [menu]="menuId"></ion-menu-button>
      <ion-back-button *ngIf="backHref" [defaultHref]="backHref" [text]="backText"></ion-back-button>
    </ion-buttons>

    <ion-title>{{ pageTitle }}</ion-title>
  </ion-toolbar>
</ion-header>
