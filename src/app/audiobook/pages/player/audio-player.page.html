<ion-header class="ion-no-border player-header">
  <ion-toolbar>
    <div class="player-title-row">
      <ion-back-button defaultHref="/audiobook" text="Tilbage"></ion-back-button>
      <h1>Lydbøger</h1>
      <span class="header-spacer"></span>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen class="audio-player-content">
  <app-audio-player
    [sounds]="sounds"
    [initialIndex]="current"
    [loading]="loading"
    [error]="error"
  ></app-audio-player>
</ion-content>
