<ion-note *ngIf="!isNative" color="medium">
  Push-notifikationer kan først registreres i Android/iOS-buildet.
</ion-note>

<ion-button
  *ngIf="isNative"
  expand="block"
  type="button"
  [disabled]="loading || subscribed"
  (click)="register()"
>
  <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
  <ion-icon *ngIf="!loading" name="checkmark-circle-outline" slot="start"></ion-icon>
  {{ subscribed ? 'Tilmeldt notifikationer' : 'Tilmeld notifikationer' }}
</ion-button>
