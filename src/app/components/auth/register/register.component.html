<div class="max-w-md mx-auto mt-10">

  <ion-card class="p-6 rounded-2xl shadow-lg">

    <ion-card-header class="text-center mb-5">
      <ion-card-title>Opret konto</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <form [formGroup]="registerForm" (ngSubmit)="submit()" class="space-y-6">

        <!-- FIRSTNAME -->
        <div>
          <ion-input
            type="text"
            formControlName="firstname"
            label="Fornavn"
            labelPlacement="floating"
          ></ion-input>

          <p *ngIf="errors?.firstname" class="text-danger text-sm mt-1">
            {{ errors?.firstname }}
          </p>
        </div>

        <!-- LASTNAME -->
        <div>
          <ion-input
            type="text"
            formControlName="lastname"
            label="Efternavn"
            labelPlacement="floating"
          ></ion-input>

          <p *ngIf="errors?.lastname" class="text-danger text-sm mt-1">
            {{ errors?.lastname }}
          </p>
        </div>

        <!-- EMAIL -->
        <div>
          <ion-input
            type="email"
            formControlName="email"
            label="E-mail"
            labelPlacement="floating"
            placeholder="you@email.com"
          ></ion-input>

          <p *ngIf="errors?.email" class="text-danger text-sm mt-1">
            {{ errors?.email }}
          </p>
        </div>

        <!-- PASSWORD -->
        <div>
          <ion-input
            type="password"
            formControlName="password"
            label="Password"
            labelPlacement="floating"
            placeholder="••••••••"
          ></ion-input>

          <p *ngIf="errors?.password" class="text-danger text-sm mt-1">
            {{ errors?.password }}
          </p>
        </div>

        <!-- BUTTON -->
        <ion-button
          expand="block"
          type="submit"
          [disabled]="loading"
          class="mt-6 h-12 font-semibold"
        >
          <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
          <span *ngIf="!loading">Opret bruger</span>
        </ion-button>

      </form>

    </ion-card-content>

  </ion-card>

</div>
