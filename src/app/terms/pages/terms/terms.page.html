<ion-content class="ion-padding terms-content" [scrollY]="true">
  <div class="terms-scroll animate__animated animate__fadeInUp app-animate">
    <section class="page-heading">
      <p>Kunsten at tæmme en tiger</p>
      <h1>Betingelser</h1>
    </section>

    <app-loading *ngIf="loading" label="Henter betingelser"></app-loading>

    <p *ngIf="!loading && error" class="state-message">{{ error }}</p>

    <article *ngIf="!loading && content" class="terms-body" [innerHTML]="content"></article>

    <p *ngIf="!loading && !error && !content" class="state-message">
      Der er ingen betingelser at vise.
    </p>
  </div>
</ion-content>
