<div class="auth-form">
  <header>
    <h1>Nulstil kodeord</h1>
    <p>Indtast din e-mail, så sender vi dig et link til at nulstille dit kodeord.</p>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <ion-item lines="none">
      <ion-input
        type="email"
        formControlName="email"
        label="E-mail"
        labelPlacement="floating"
        placeholder="dig@email.dk"
      ></ion-input>
    </ion-item>

    <p *ngIf="errors?.email" class="error-text">{{ errors?.email }}</p>
    <p *ngIf="success" class="success-text">Vi har sendt et nulstillingslink, hvis e-mailen findes hos os.</p>

    <ion-button expand="block" type="submit" [disabled]="loading">
      <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
      <span *ngIf="!loading">Send link</span>
    </ion-button>
  </form>
</div>
